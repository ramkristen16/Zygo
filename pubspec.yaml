name: zygo
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  iconsax_plus: ^1.0.0
  iconsax_flutter: ^1.0.1
  iconsax: ^0.0.8
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  provider: ^6.1.5+1
  google_sign_in: ^6.2.1
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  firebase_storage: ^13.4.3
  geoflutterfire_plus: ^0.0.34
  geolocator: ^14.0.3



dev_dependencies:
  flutter_test:
    sdk: flutter
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/image/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/image/logo.svg
    - assets/image/onboarding1.svg
    - assets/image/onboarding2.svg
    - assets/image/google.svg
    - assets/fonts/Lexend-Black.ttf
    - assets/fonts/Lexend-Bold.ttf
    - assets/fonts/Lexend-ExtraBold.ttf
    - assets/fonts/Lexend-ExtraLight.ttf
    - assets/fonts/Lexend-Light.ttf
    - assets/fonts/Lexend-Medium.ttf
    - assets/fonts/Lexend-Regular.ttf
    - assets/fonts/Lexend-SemiBold.ttf
    - assets/fonts/Lexend-Thin.ttf
    - assets/fonts/Lexend-VariableFont_wght.ttf
